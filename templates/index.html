<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luel DataBridge - Parsing Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex justify-between items-center glass-panel p-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-600">Luel DataBridge</h1>
                <p class="text-slate-400 mt-1 text-sm">Multimodal Parsing Optimization Monitor</p>
            </div>
            <div class="flex items-center space-x-3 bg-slate-900/50 px-4 py-2 rounded-full border border-slate-700/50">
                <div class="w-2.5 h-2.5 rounded-full bg-sky-400 pulse"></div>
                <span class="text-xs font-medium text-sky-400 uppercase tracking-widest">System Online</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-panel p-6 flex flex-col justify-center">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Total Payloads Parsed</h3>
                <p class="text-4xl font-light tracking-tight" id="total-parsed">0</p>
            </div>
            <div class="glass-panel p-6 flex flex-col justify-center">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Avg Parse Latency</h3>
                <p class="text-4xl font-light tracking-tight"><span id="avg-time">0.000</span> <span class="text-lg text-slate-500 font-medium">sec</span></p>
            </div>
            <div class="glass-panel p-6 flex flex-col justify-center">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Active Worker Threads</h3>
                <p class="text-4xl font-light tracking-tight text-sky-400" id="threads">1</p>
            </div>
        </div>

        <div class="glass-panel p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-medium text-slate-200">Live Ingestion Stream</h2>
                <button onclick="simulateUpload()" class="bg-sky-500/10 hover:bg-sky-500/20 border border-sky-500/50 text-sky-400 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200">
                    Simulate Payload Push
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700/50 text-xs uppercase tracking-widest text-slate-500">
                            <th class="pb-4 font-medium">Modality</th>
                            <th class="pb-4 font-medium">Status</th>
                            <th class="pb-4 font-medium">Latency</th>
                            <th class="pb-4 font-medium">Lifecycle Stage</th>
                        </tr>
                    </thead>
                    <tbody id="log-table" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const modalities = [
            'IMU Sensor Stream (.csv)', 
            'Parametric CAD History (.ipt)', 
            'Audio Metadata JSON', 
            'Egocentric Video Metadata'
        ];
        
        async function fetchMetrics() {
            try {
                const res = await fetch('/api/metrics');
                const data = await res.json();
                document.getElementById('total-parsed').innerText = data.total_parsed;
                document.getElementById('avg-time').innerText = data.avg_parse_time.toFixed(3);
                document.getElementById('threads').innerText = data.active_threads;
            } catch (err) {
                console.error("Metrics fetch error:", err);
            }
        }

        async function simulateUpload() {
            const randomModality = modalities[Math.floor(Math.random() * modalities.length)];
            const tbody = document.getElementById('log-table');
            const row = document.createElement('tr');
            row.className = 'border-b border-slate-800/30 transition-all duration-300';
            
            // Optimistic UI update (shows parsing in progress)
            row.innerHTML = `
                <td class="py-4 text-slate-300">${randomModality}</td>
                <td class="py-4"><span class="px-2.5 py-1 bg-yellow-500/10 text-yellow-400 rounded text-xs border border-yellow-500/20">Parsing...</span></td>
                <td class="py-4 text-slate-500 text-xs font-mono">calculating</td>
                <td class="py-4 text-slate-500">Awaiting QA Pipeline</td>
            `;
            tbody.prepend(row);

            try {
                const res = await fetch('/api/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ modality: randomModality })
                });
                const data = await res.json();
                
                // Update row with success details
                row.innerHTML = `
                    <td class="py-4 text-slate-200 font-medium">${data.modality}</td>
                    <td class="py-4"><span class="px-2.5 py-1 bg-emerald-500/10 text-emerald-400 rounded text-xs border border-emerald-500/20">Success</span></td>
                    <td class="py-4 text-emerald-400 font-mono text-xs">${data.parsing_time.toFixed(4)}s</td>
                    <td class="py-4 text-slate-300">Ready for QA</td>
                `;
                fetchMetrics();
            } catch (err) {
                row.innerHTML = `
                    <td class="py-4 text-slate-300">${randomModality}</td>
                    <td class="py-4"><span class="px-2.5 py-1 bg-red-500/10 text-red-400 rounded text-xs border border-red-500/20">Failed</span></td>
                    <td class="py-4 text-red-400">--</td>
                    <td class="py-4 text-slate-500">Dropped</td>
                `;
            }
        }

        // Poll metrics to keep the dashboard feeling "live"
        setInterval(fetchMetrics, 3000);
        fetchMetrics();
    </script>
</body>
</html>
